<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Criar Admin - HRPI</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f4f5; }
        .box { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        button { background: #00695c; color: white; border: none; padding: 15px 40px; border-radius: 5px; font-size: 18px; cursor: pointer; margin: 10px; }
        button:hover { background: #004d40; }
        .success { color: green; display: none; }
        .error { color: red; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🏥 Criar Admin HRPI</h2>
        <button onclick="criar()">Criar Usuário Administrador</button>
        <p class="success" id="s">✅ Criado! Login: admin | Senha: admin123</p>
        <p class="error" id="e">❌ Erro! Verifique o console (F12)</p>
    </div>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyDcUK7ZwpxX7voL5vGr71ltW0WclRm8NJ8",
            authDomain: "hrpi-sistema-recepcao.firebaseapp.com",
            databaseURL: "https://hrpi-sistema-recepcao-default-rtdb.firebaseio.com",
            projectId: "hrpi-sistema-recepcao",
            storageBucket: "hrpi-sistema-recepcao.firebasestorage.app",
            messagingSenderId: "233408674656",
            appId: "1:233408674656:web:45805b396a7cd7d6e1bc05"
        });
        
        async function criar() {
            try {
                await firebase.database().ref('usuarios/admin001').set({
                    id: 'admin001',
                    nome: 'Administrador',
                    usuario: 'admin',
                    senha: 'admin123',
                    cargo: 'Administrador',
                    ativo: true,
                    primeiroAcesso: false
                });
                document.getElementById('s').style.display = 'block';
            } catch(e) {
                document.getElementById('e').style.display = 'block';
                console.error(e);
            }
        }
    </script>
</body>
</html>
